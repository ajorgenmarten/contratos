name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
  DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
  FRONTEND_BUILD_ARG_BACKEND_URL: ${{secrets.FRONTEND_BUILD_ARG_BACKEND_URL}}
  IMAGE_NAME_BACKEND: contracts-backend
  IMAGE_NAME_FRONTEND: contracts-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/contracts-${{ matrix.service == 'backend' && 'backend' || 'frontend' }}:${{ github.sha }}
          build-args: ${{ matrix.service == 'frontend' &&  env.FRONTEND_BUILD_ARG_BACKEND_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
